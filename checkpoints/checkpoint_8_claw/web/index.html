<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111827;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f9fafb;
  }

  .status {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
  }

  .status-dot.connected {
    background: #22c55e;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message.user {
    align-self: flex-end;
    background: #2563eb;
    color: #f9fafb;
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: #1f2937;
    border: 1px solid #374151;
    border-bottom-left-radius: 4px;
  }

  .message.assistant .content code {
    background: #374151;
    padding: 1px 4px;
    border-radius: 3px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }

  .message.assistant .content pre {
    background: #0d1117;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    line-height: 1.4;
  }

  .message.assistant .content pre code {
    background: none;
    padding: 0;
  }

  .message.assistant .content ul,
  .message.assistant .content ol {
    margin: 4px 0 4px 20px;
  }

  .message.assistant .content strong {
    color: #f9fafb;
  }

  .tool-call {
    font-size: 12px;
    color: #9ca3af;
    padding: 4px 10px;
    border-left: 2px solid #4b5563;
    margin: 2px 0;
    align-self: flex-start;
  }

  .tool-call .tool-name {
    color: #60a5fa;
    font-weight: 500;
  }

  .typing-indicator {
    align-self: flex-start;
    color: #6b7280;
    font-size: 13px;
    padding: 4px 14px;
    display: none;
  }

  .typing-indicator.visible {
    display: block;
  }

  .typing-indicator span {
    animation: blink 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 60%, 100% { opacity: 0.2; }
    30% { opacity: 1; }
  }

  .input-area {
    padding: 12px 20px;
    background: #1f2937;
    border-top: 1px solid #374151;
    display: flex;
    gap: 8px;
  }

  .input-area input {
    flex: 1;
    background: #111827;
    border: 1px solid #374151;
    color: #e5e7eb;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  .input-area input:focus {
    border-color: #2563eb;
  }

  .input-area button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }

  .input-area button:hover {
    background: #1d4ed8;
  }

  .input-area button:disabled {
    background: #374151;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Claw</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</div>

<div class="messages" id="messages">
</div>

<div class="typing-indicator" id="typingIndicator">
  <span>.</span><span>.</span><span>.</span> thinking
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
  <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const typingIndicator = document.getElementById('typingIndicator');

  let ws = null;
  let currentAssistantMsg = null;
  let reconnectTimer = null;

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host + '/ws');

    ws.onopen = function() {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    };

    ws.onclose = function() {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected';
      typingIndicator.classList.remove('visible');
      // Attempt reconnect after 3 seconds.
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(event) {
      const data = JSON.parse(event.data);
      handleServerMessage(data);
    };
  }

  function handleServerMessage(data) {
    switch (data.type) {
      case 'chunk':
        typingIndicator.classList.add('visible');
        if (!currentAssistantMsg) {
          currentAssistantMsg = addMessage('', 'assistant');
        }
        appendToMessage(currentAssistantMsg, data.content);
        scrollToBottom();
        break;

      case 'done':
        typingIndicator.classList.remove('visible');
        if (currentAssistantMsg) {
          renderMarkdown(currentAssistantMsg);
        }
        currentAssistantMsg = null;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
        scrollToBottom();
        break;

      case 'tool_call':
        addToolCall(data.name, 'executing');
        scrollToBottom();
        break;

      case 'tool_result':
        addToolCall(data.name, 'complete');
        scrollToBottom();
        break;

      case 'error':
        typingIndicator.classList.remove('visible');
        currentAssistantMsg = null;
        const errMsg = addMessage(data.content || 'An error occurred.', 'assistant');
        errMsg.style.borderColor = '#ef4444';
        sendBtn.disabled = false;
        inputEl.disabled = false;
        scrollToBottom();
        break;
    }
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage(text, 'user');
    ws.send(JSON.stringify({ type: 'message', content: text }));
    inputEl.value = '';
    sendBtn.disabled = true;
    inputEl.disabled = true;
    typingIndicator.classList.add('visible');
    scrollToBottom();
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const content = document.createElement('div');
    content.className = 'content';
    content.textContent = text;
    div.appendChild(content);
    messagesEl.appendChild(div);
    return content;
  }

  function appendToMessage(contentEl, text) {
    contentEl.textContent += text;
  }

  function addToolCall(name, status) {
    const div = document.createElement('div');
    div.className = 'tool-call';
    const icon = status === 'executing' ? '...' : 'ok';
    div.innerHTML = '<span class="tool-name">' + escapeHtml(name) + '</span> ' + icon;
    messagesEl.appendChild(div);
  }

  function renderMarkdown(contentEl) {
    let text = contentEl.textContent;

    // Code blocks (``` ... ```)
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
    });

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Unordered lists
    text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    contentEl.innerHTML = text;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  connect();
</script>

</body>
</html>
