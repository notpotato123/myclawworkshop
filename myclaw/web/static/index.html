<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f5f4;
      --surface:    #ffffff;
      --border:     #e7e5e4;
      --accent:     #4f46e5;
      --accent-dim: #eef2ff;
      --agent-bg:   #f0fdf4;
      --agent-bd:   #bbf7d0;
      --user-bg:    #4f46e5;
      --text:       #1c1917;
      --muted:      #78716c;
      --radius:     14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      user-select: none;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      gap: 4px;
    }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }

    .msg .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user  .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--agent-bd);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.system .bubble {
      background: var(--accent-dim);
      border: 1px solid #c7d2fe;
      color: #4338ca;
      font-size: 13px;
    }
    .msg.system { align-self: center; max-width: 90%; }

    /* ── Tool badge ── */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      background: var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      margin: 2px 0;
    }
    .tool-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--agent-bd);
      padding: 12px 16px;
    }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6ee7b7;
      animation: bounce .9s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0);   opacity: .6; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    #input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      background: var(--bg);
      color: var(--text);
      min-height: 44px;
      max-height: 160px;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    button#send {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background .15s, transform .1s;
    }
    button#send:hover  { background: #4338ca; }
    button#send:active { transform: scale(.95); }
    button#send:disabled { background: var(--border); cursor: not-allowed; }
    button#send svg { width: 20px; height: 20px; }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">⌘</div>
    <div>
      <h1>Claw</h1>
      <p>AI agent — connecting…</p>
    </div>
  </header>

  <div id="messages">
    <div class="msg system">
      <div class="bubble">WebSocket not yet connected. This is a static preview.</div>
    </div>
  </div>

  <div id="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Message Claw…"
      autofocus
    ></textarea>
    <button id="send" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // ── Send on Enter (Shift+Enter for newline) ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    // Placeholder: echo back a stub until WebSocket is wired up.
    showTyping();
    setTimeout(() => {
      removeTyping();
      appendMessage('agent', '(WebSocket not connected — backend coming soon)');
    }, 800);
  }

  // ── Message helpers ──
  function appendMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const label  = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Claw';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  let typingEl = null;
  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'msg agent typing';
    typingEl.innerHTML = '<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(typingEl);
    scrollToBottom();
  }
  function removeTyping() {
    typingEl?.remove();
    typingEl = null;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Expose for WebSocket wiring in the next step.
  window.__claw = { appendMessage, showTyping, removeTyping, scrollToBottom };
</script>
</body>
</html>
